<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ff4081" />
  <title>AKB48 Seat Memo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="core.css?v=3.5.0" />
  <link rel="stylesheet" href="style.css?v=3.5.0" />
</head>
<body class="native-feel">
  <div class="app-shell">
    <header class="hero apple-glass-3d hover-glow">
      <div class="hero-copy">
        <p class="eyebrow" data-i18n="eyebrow">AKB48 Theater Seat Memo</p>
        <h1 data-i18n="appTitle">座席メモメーカー</h1>
        <p class="lead" data-i18n="lead">座席や立見位置を選択して、ピンクの応援矢印つき画像として保存できます。</p>
      </div>
      <div class="hero-actions" aria-label="Language selector">
        <label class="field-label lang-label" for="langSelect" data-i18n="language">言語</label>
        <select id="langSelect" class="control-input lang-input">
          <option value="ja">日本語</option>
          <option value="zh">繁體中文</option>
          <option value="zh-Hans">简体中文</option>
          <option value="ko">한국어</option>
          <option value="th">ไทย</option>
          <option value="id">Bahasa Indonesia</option>
          <option value="en">English</option>
        </select>
      </div>
    </header>

    <main class="workspace">
      <section class="map-card" aria-label="Seat map">
        <div class="map-toolbar">
          <div class="selected-pill" id="selectedPill" data-i18n="noSelection">まだ選択されていません</div>
          <div class="zoom-control" aria-label="Map zoom">
            <button class="zoom-button" id="zoomOutBtn" type="button" data-i18n-aria-label="zoomOut" aria-label="Zoom out">−</button>
            <span class="zoom-level" id="zoomLevel" aria-live="polite">100%</span>
            <button class="zoom-button" id="zoomInBtn" type="button" data-i18n-aria-label="zoomIn" aria-label="Zoom in">＋</button>
          </div>
        </div>

        <div class="map-scroll" id="mapScroll">
          <div class="map-stage" id="mapStage">
            <img src="assets/seatmap.svg?v=3.5.0" alt="AKB48 theater seat map" id="baseSeatMap" class="seatmap-base allow-save" draggable="false" />
            <svg id="seatOverlay" class="seat-overlay" viewBox="0 0 760 640" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Interactive seat overlay"></svg>
          </div>
        </div>
      </section>

      <aside class="control-card apple-glass-3d" data-tilt-strength="0.16">
        <div class="control-section">
          <label class="field-label" for="performanceSelect" data-i18n="performance">公演名</label>
          <select id="performanceSelect" class="control-input"></select>
        </div>

        <div class="control-section">
          <label class="field-label" for="eventDateInput" data-i18n="eventDate">イベント日時</label>
          <input id="eventDateInput" class="control-input" type="datetime-local" />
        </div>

        <div class="control-section">
          <label class="field-label" for="nameInput" data-i18n="displayName">表示名（任意）</label>
          <input id="nameInput" class="control-input" type="text" maxlength="28" data-i18n-placeholder="displayNamePlaceholder" placeholder="例：秋元康 (akimoto yasushi)" />
        </div>

        <div class="control-section">
          <label class="field-label" for="numberInput" data-i18n="entryNumber">番号</label>
          <input id="numberInput" class="control-input" type="text" maxlength="24" data-i18n-placeholder="entryNumberPlaceholder" placeholder="例：A001" />
        </div>

        <div class="control-section">
          <label class="field-label" for="tourSelect" data-i18n="tourRound">巡目</label>
          <select id="tourSelect" class="control-input"></select>
        </div>

        <div class="summary-box">
          <p class="summary-label" data-i18n="currentSelection">現在の選択</p>
          <p class="summary-main" id="selectionSummary" data-i18n="noSelection">まだ選択されていません</p>
          <p class="summary-sub" id="selectionSub" data-i18n="selectHint">座席または立見エリアをタップしてください。</p>
        </div>

        <div class="button-row">
          <button class="primary-button" id="downloadBtn" type="button" data-i18n="download">画像を保存</button>
          <button class="secondary-button" id="clearBtn" type="button" data-i18n="clear">選択解除</button>
        </div>

        <button class="link-button" id="copyLinkBtn" type="button" data-i18n="copyLink">共有リンクをコピー</button>

        <div class="notes">
          <p data-i18n="safariNote">iPhone / Safari では画像プレビューが開きます。長押しして保存してください。</p>
        </div>
      </aside>
    </main>

    <footer class="site-footer apple-glass-3d">
      <p data-i18n="siteDisclaimer">本サイトはファンである ゴメン先生 (gomensensei) が作成した非公式のものであり、AKB48運営とは一切関係ありません。各権利者に帰属します。</p>
    </footer>

  </div>

  <div class="modal-backdrop" id="exportModal" hidden>
    <div class="export-modal apple-glass-3d" role="dialog" aria-modal="true" aria-labelledby="exportModalTitle">
      <button class="modal-close" id="modalCloseBtn" type="button" aria-label="Close">×</button>
      <h2 id="exportModalTitle" data-i18n="modalTitle">画像プレビュー</h2>
      <p data-i18n="modalInstruction">画像を長押しして保存してください。</p>
      <img id="exportPreview" class="export-preview allow-save" alt="Export preview" />
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="core.js?v=3.5.0"></script>
  <script src="seatmap-data.js?v=3.5.0"></script>
  <script src="script.js?v=3.5.0"></script>
</body>
</html>
